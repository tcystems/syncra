<div class="our-works-page">
  <div class="container">
    <div class="works-header">
      <h1>Built with precision to support<br>growth, efficiency, and long-term success.</h1>
    </div>

    <div class="works-grid">
      <!-- Cards list -->
      <a [routerLink]="['/software', project.slug]" class="work-card" *ngFor="let project of projects">
        <div class="card-image">
          <img [src]="project.image" [alt]="project.title">
        </div>
        <div class="card-info">
          <img [src]="project.logo" [alt]="project.title + ' Logo'" class="client-logo">
          <div class="client-text">
            <h3>{{ project.title }}</h3>
            <p>{{ project.subtitle }}</p>
          </div>
        </div>
      </a>
    </div>
  </div>

  <app-contact></app-contact>
</div>
