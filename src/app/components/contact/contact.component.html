<section id="contact" class="contact-section">
  <div class="container contact-container">
    <div class="contact-content">
      <span class="section-badge">GET IN TOUCH</span>
      <h2>Let's Build Your<br>Growth Journey<br>Together.</h2>
      <p>We're ready to help you build a more efficient and dependable team.</p>
    </div>

    <div class="contact-form-card">
      <form class="contact-form" (submit)="onSubmit($event)">
        <div class="form-group">
          <input type="text" placeholder="Your Name *" required>
        </div>
        <div class="form-group">
          <input type="email" placeholder="Email Address *" required>
        </div>
        <div class="form-group">
          <input type="tel" placeholder="Phone Number (Optional)">
        </div>
        <div class="form-group custom-select-wrapper">
          <div class="custom-multiselect" [class.open]="servicesDropdownOpen">
            <button
              type="button"
              class="custom-multiselect-trigger"
              (click)="toggleServicesDropdown()"
              [class.has-value]="selectedServices.length > 0"
            >
              <span class="custom-multiselect-label">{{ getServicesLabel() }}</span>
              <svg class="custom-multiselect-arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </button>
            <div class="custom-multiselect-panel" *ngIf="servicesDropdownOpen">
              <label class="custom-multiselect-option" *ngFor="let option of serviceOptions" (click)="toggleService(option.value); $event.preventDefault()">
                <span class="custom-checkbox" [class.checked]="isServiceSelected(option.value)">
                  <svg *ngIf="isServiceSelected(option.value)" xmlns="http://www.w3.org/2000/svg" width="10" height="8" viewBox="0 0 10 8">
                    <path d="M1 4l3 3 5-6" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
                <span class="custom-option-text">{{ option.label }}</span>
              </label>
            </div>
            <div class="custom-multiselect-backdrop" *ngIf="servicesDropdownOpen" (click)="closeServicesDropdown()"></div>
          </div>
        </div>
        <div class="form-group">
          <textarea placeholder="Message *" required rows="3"></textarea>
        </div>
        <button type="submit" class="btn-submit">Leave Us a Message</button>
      </form>
    </div>
  </div>
</section>
