<section id="contact" class="contact-section">
  <div class="container contact-container">
    <div class="contact-content">
      <span class="section-badge">GET IN TOUCH</span>
      <h2>Let's Build Your<br>Growth Journey<br>Together.</h2>
      <p>We're ready to help you build a more efficient and dependable team.</p>
    </div>

    <div class="contact-form-card">
      <form class="contact-form" (submit)="onSubmit($event)">
        <div class="form-group">
          <input type="text" placeholder="Your Name *" required>
        </div>
        <div class="form-group">
          <input type="email" placeholder="Email Address *" required>
        </div>
        <div class="form-group">
          <input type="tel" placeholder="Phone Number (Optional)">
        </div>
        <div class="form-group select-group">
          <select required>
            <option value="" disabled selected hidden>What type of service are you looking for?</option>
            <option value="emc-billing">Copy Service Billing &amp; Revenue</option>
            <option value="healthcare-rcm">Healthcare RCM</option>
            <option value="administrative-support">Administrative Support</option>
            <option value="finance-solutions">Finance Solutions</option>
            <option value="tech-software">Tech &amp; Software</option>
            <option value="digital-marketing">Digital Marketing Solutions</option>
            <option value="legal-process-outsourcing">Legal Process Outsourcing (LPO)</option>
          </select>
          <span class="select-arrow">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </span>
        </div>
        <div class="form-group">
          <textarea placeholder="Message *" required rows="3"></textarea>
        </div>
        <button type="submit" class="btn-submit">Leave Us a Message</button>
      </form>
    </div>
  </div>
</section>
